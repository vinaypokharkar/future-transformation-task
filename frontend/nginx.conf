server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router owns the routes, not nginx. Without this fallback, loading or
    # refreshing /tasks directly asks nginx for a file that doesn't exist and
    # returns 404 — the classic SPA deploy bug. Serve index.html and let the
    # router resolve the path client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints these filenames, so a given URL's content never changes.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must never be cached: it's what points at the fingerprinted
    # bundles, so a stale copy pins users to a deleted build.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
